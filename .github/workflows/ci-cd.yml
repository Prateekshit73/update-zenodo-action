name: CI/CD
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_COLOR: 1

jobs:
  pre-commit:
    name: Run pre-commit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          check-latest: true
          python-version: '3.13'

      - name: Install dependencies for zenodo-upload
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/actions/zenodo-upload/requirements.txt

  upload-to-zenodo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: dist/

      - name: Prepare release archive
        run: |
          zip -r release-artifacts-${{ github.ref_name }}.zip dist/*
          echo "FILES=release-artifacts-${{ github.ref_name }}.zip" >> $GITHUB_ENV

      - name: Update Zenodo deposition
        uses: vacanza/update-zenodo-action@v1
        with:
          token: ${{ secrets.ZENODO_TOKEN }}
          files: ${{ env.FILES }}
          concept_id: ${{ secrets.ZENODO_CONCEPT_ID }}
          metadata_file: "CITATION.cff"
          sandbox: "false"